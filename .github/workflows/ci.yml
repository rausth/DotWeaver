name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app
        
      - name: Build and Test
        run: swift test

      - name: Validate scripts
        run: bash -n script/*.sh

      - name: Provider matrix smoke
        run: script/smoke_provider_matrix.sh
