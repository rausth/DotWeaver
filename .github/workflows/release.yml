name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app
        
      - name: Build Apple Silicon
        run: swift build -c release --arch arm64
        
      - name: Build Intel
        run: swift build -c release --arch x86_64
        
      - name: Create Release Package
        run: |
          mkdir -p package/AppleSilicon package/Intel
          cp .build/arm64-apple-macosx/release/DotWeaverApp package/AppleSilicon/
          cp .build/x86_64-apple-macosx/release/DotWeaverApp package/Intel/
          tar -czf DotWeaver-macOS.tar.gz package/
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: DotWeaver-macOS.tar.gz
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Trigger Homebrew Tap Update
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.RELEASE_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository_owner }}/homebrew-dotweaver/dispatches \
            -d '{"event_type":"new-release"}'
        continue-on-error: true
